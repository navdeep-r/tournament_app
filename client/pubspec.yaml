name: tournament_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3

  # Networking
  dio: ^5.3.2
  web_socket_channel: ^2.4.0

  # Auth
  google_sign_in: ^6.1.6

  # Storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^12.0.0

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  badges: ^3.1.1
  percent_indicator: ^4.2.3
  dotted_border: ^2.1.0
  pin_code_fields: ^8.0.1
  image_picker: ^1.0.4

  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Utils
  intl: ^0.18.1
  collection: ^1.18.0

  # Payment
  razorpay_flutter: ^1.3.5
  upi_india:
    path: ./plugins/upi_india

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/lottie/
    - assets/images/
